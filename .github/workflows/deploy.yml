name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_IMAGE: ghcr.io/${{ github.repository }}-server
  WEB_IMAGE: ghcr.io/${{ github.repository }}-web
  IMPORT_IMAGE: ghcr.io/${{ github.repository }}-import

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dist/server.Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dist/web.Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push import image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dist/import.Dockerfile
          push: true
          tags: |
            ${{ env.IMPORT_IMAGE }}:latest
            ${{ env.IMPORT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      # Copy the compose file and content-sync script to ~/holybook on the droplet.
      - name: Copy deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "dist/compose.yaml,dist/sync-content.sh"
          target: holybook
          strip_components: 1

      - name: Render .env, pull images and restart
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          SERVER_IMAGE: ${{ env.SERVER_IMAGE }}:${{ github.sha }}
          WEB_IMAGE: ${{ env.WEB_IMAGE }}:${{ github.sha }}
          IMPORT_IMAGE: ${{ env.IMPORT_IMAGE }}:${{ github.sha }}
          SITE_ADDRESS: ${{ secrets.SITE_ADDRESS }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,SERVER_IMAGE,WEB_IMAGE,IMPORT_IMAGE,SITE_ADDRESS,DB_PASSWORD,GEMINI_API_KEY
          script: |
            set -euo pipefail
            cd ~/holybook
            umask 077
            cat > .env <<EOF
            SITE_ADDRESS=${SITE_ADDRESS}
            DB_PASSWORD=${DB_PASSWORD}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            SERVER_IMAGE=${SERVER_IMAGE}
            WEB_IMAGE=${WEB_IMAGE}
            IMPORT_IMAGE=${IMPORT_IMAGE}
            EOF
            chmod +x sync-content.sh
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose pull importer
            docker compose up -d
            docker image prune -f
